version: '3.8'
services:
  database:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"
    environment:
      - REDIS_PORT=6379
    volumes:
      - redis-data:/data

  redis-insight:
    image: redis/redisinsight:latest
    restart: always
    ports:
      - "5540:5540"
    volumes:
      - redis-insight:/data

  collector:
    build:
      context: ./backend
      dockerfile: Dockerfile-collector
    environment:
      - REDIS_URL=redis://database:6379
      - COLLECTOR_PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - database

volumes:
  redis-data:
  redis-insight: